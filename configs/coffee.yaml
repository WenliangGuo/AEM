dataset_name: EgoPER
train_split: training
val_split: validation
test_split: test
model_name: LocPointTransformer
devices: ['cuda']
dataset: {
  num_classes: 16,
  trunc_thresh: 0.5,
  crop_ratio: [0.9, 1.0],
  max_seq_len: 2304,
  background_ratio: 1.0,
  task: coffee,
  root_dir: data/
}
model: {
  fpn_type: identity,
  backbone_type: convTransformer,
  max_buffer_len_factor: 6.0,
  n_mha_win_size: 19,
  action_model_cfg: {
    txt_input_dim: 768,
    feat_dim: 128
  },
  effect_model_cfg: {
    vis_input_dim: 768,
    txt_input_dim: 768,
    node_type_dim: 16,
    feat_dim: 256,
    vis_proj_num_layers: 1,
    pos_embed_proj_num_layers: 2,
    effect_proj_num_layers: 3,
    segment_proj_num_layers: 1,
    effect_transformer_num_layers: 1,
    state_graph_encoder_num_layers: 2,
    spatial_graph_encoder_num_layers: 2,
    gnn_num_layers: 1,
    gnn_num_heads: 8,
    gnn_dropout: 0.0
  }
}
opt: {
  learning_rate: 0.0001,
  epochs: 130,
  weight_decay: 0.05,
  schedule_gamma: 0.7,
}
loader: {
  batch_size: 2,
}
train_cfg: {
  init_loss_norm: 100,
  clip_grad_l2norm: 1.0,
  cls_prior_prob: 0.01,
  center_sample: radius,
  center_sample_radius: 1.5,
}
test_cfg: {
  voting_thresh: 0.7,
  pre_nms_topk: 2000,
  max_seg_num: 200,
  min_score: 0.001,
  multiclass_nms: True,
}
output_folder: ckpt/
